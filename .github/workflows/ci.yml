name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stock-pipeline:ci .

  notify:
    name: Slack Notify
    runs-on: ubuntu-latest
    needs: [lint, docker-build]
    if: always()
    steps:
      - name: Set status
        id: status
        run: |
          if [[ "${{ needs.lint.result }}" == "success" && "${{ needs.docker-build.result }}" == "success" ]]; then
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "label=CI 통과" >> $GITHUB_OUTPUT
          else
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "label=CI 실패" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.icon }} *${{ steps.status.outputs.label }}*\n*브랜치:* `${{ github.ref_name }}`\n*작성자:* ${{ github.actor }}\n*링크:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Lint: ${{ needs.lint.result }}  |  Docker Build: ${{ needs.docker-build.result }}"
                    }
                  ]
                }
              ]
            }'
